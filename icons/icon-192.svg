<svg
  xmlns="http://www.w3.org/2000/svg"
  width="192"
  height="192"
  viewBox="0 0 192 192"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Focus C.E.R.O.</title>

  <desc id="desc">
    Icono azul oscuro con las letras FC y un círculo de enfoque.
  </desc>

  <defs>
    <linearGradient
      id="background"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0%"
        stop-color="#07111f"
      />

      <stop
        offset="100%"
        stop-color="#153154"
      />
    </linearGradient>

    <linearGradient
      id="accent"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0%"
        stop-color="#2f80ff"
      />

      <stop
        offset="100%"
        stop-color="#68a7ff"
      />
    </linearGradient>

    <filter
      id="shadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
    >
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="8"
        flood-color="#000000"
        flood-opacity="0.35"
      />
    </filter>
  </defs>

  <rect
    width="192"
    height="192"
    rx="44"
    fill="url(#background)"
  />

  <circle
    cx="96"
    cy="96"
    r="62"
    fill="none"
    stroke="#243650"
    stroke-width="10"
  />

  <path
    d="M96 34
       A62 62 0 0 1 158 96"
    fill="none"
    stroke="url(#accent)"
    stroke-width="10"
    stroke-linecap="round"
  />

  <circle
    cx="96"
    cy="96"
    r="42"
    fill="#0e1b2d"
    filter="url(#shadow)"
  />

  <text
    x="96"
    y="107"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="38"
    font-weight="700"
    fill="#ffffff"
  >
    FC
  </text>

  <circle
    cx="145"
    cy="47"
    r="9"
    fill="#2ecc71"
  />
</svg>

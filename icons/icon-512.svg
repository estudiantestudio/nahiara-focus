<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Focus C.E.R.O.</title>

  <desc id="desc">
    Icono azul oscuro con las letras FC y un círculo de enfoque.
  </desc>

  <defs>
    <linearGradient
      id="background"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0%"
        stop-color="#07111f"
      />

      <stop
        offset="100%"
        stop-color="#153154"
      />
    </linearGradient>

    <linearGradient
      id="accent"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop
        offset="0%"
        stop-color="#2f80ff"
      />

      <stop
        offset="100%"
        stop-color="#68a7ff"
      />
    </linearGradient>

    <filter
      id="shadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%"
    >
      <feDropShadow
        dx="0"
        dy="22"
        stdDeviation="22"
        flood-color="#000000"
        flood-opacity="0.35"
      />
    </filter>
  </defs>

  <rect
    width="512"
    height="512"
    rx="118"
    fill="url(#background)"
  />

  <circle
    cx="256"
    cy="256"
    r="166"
    fill="none"
    stroke="#243650"
    stroke-width="28"
  />

  <path
    d="M256 90
       A166 166 0 0 1 422 256"
    fill="none"
    stroke="url(#accent)"
    stroke-width="28"
    stroke-linecap="round"
  />

  <circle
    cx="256"
    cy="256"
    r="112"
    fill="#0e1b2d"
    filter="url(#shadow)"
  />

  <text
    x="256"
    y="286"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="102"
    font-weight="700"
    fill="#ffffff"
  >
    FC
  </text>

  <circle
    cx="388"
    cy="124"
    r="24"
    fill="#2ecc71"
  />
</svg>
